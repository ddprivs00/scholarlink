<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarLink | The AI Bridge to Better Grades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
<script>
    const GEMINI_API_KEY = 'AIzaSyD1lpjBnb7Dt8OGeS7528E2rqKgxOp9GqQ';

    async function gradeEssay() {
        const essay = document.getElementById('essay-input').value;
        const btn = document.getElementById('grade-btn');
        const box = document.getElementById('feedback-box');
        const feedbackP = document.getElementById('ai-feedback');

        if (!essay) return alert("Paste your essay first!");

        btn.innerText = "AI is analyzing...";
        btn.disabled = true;

        try {
            // Updated to v1beta with the specific flash model string
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "You are a teacher. Grade this essay strictly with a Letter Grade and feedback: " + essay }]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) {
                // If it still errors, this will show us the specific Google code
                feedbackP.innerText = "Status: " + data.error.message;
                box.classList.remove('hidden');
            } else if (data.candidates && data.candidates[0].content) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                box.classList.remove('hidden');
                feedbackP.innerText = aiResponse;
            } else {
                feedbackP.innerText = "AI reached, but no response generated. Try a longer essay!";
                box.classList.remove('hidden');
            }
            
        } catch (e) {
            feedbackP.innerText = "Network Error. Check your connection.";
            box.classList.remove('hidden');
        }

        btn.innerText = "Analyze Essay";
        btn.disabled = false;
    }
</script>
    <style>
        .glitch { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; animation: glitch 725ms infinite; }
        @keyframes glitch {
            0%, 100% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff; }
            50% { text-shadow: -0.05em -0.025em 0 #fffc00, 0.025em 0.025em 0 #00fffc; }
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-3xl font-black tracking-tighter glitch">ScholarLink</h1>
        <span class="text-green-500 font-mono text-sm uppercase">AI_ONLINE</span>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-blue-400">AI Essay Grader</h2>
            <p class="text-slate-400 mb-6">Enter your essay below to see your predicted grade.</p>
            
            <textarea id="essay-input" rows="10" 
                class="w-full bg-slate-950 border-2 border-slate-700 rounded-2xl p-6 text-white text-lg outline-none focus:border-blue-500 transition-all placeholder-slate-600" 
                placeholder="Start typing or paste your essay here..."></textarea>
            
            <button onclick="gradeEssay()" id="grade-btn" 
                class="mt-6 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl text-xl shadow-lg transition-all active:scale-95">
                Analyze Essay
            </button>

            <div id="feedback-box" class="hidden mt-8 p-6 bg-slate-900 rounded-2xl border-l-4 border-blue-500">
                <h4 class="text-blue-400 font-bold uppercase tracking-widest text-sm mb-2">Gemini AI Report</h4>
                <p id="ai-feedback" class="text-slate-200 text-lg leading-relaxed"></p>
            </div>
        </div>

        <div class="mt-12 text-center text-slate-600 text-xs tracking-widest uppercase">
            [ Secure AI Terminal ]
        </div>
    </main>

</body>
</html>

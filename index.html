<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarLink | AI Essay Grader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // THE BRAIN (Moved to top so it's never "undefined")
        const GEMINI_API_KEY = 'AIzaSyD1lpjBnb7Dt8OGeS7528E2rqKgxOp9GqQ';

        async function gradeEssay() {
            console.log("Button clicked - Function starting!");
            const essay = document.getElementById('essay-input').value;
            const btn = document.getElementById('grade-btn');
            const box = document.getElementById('feedback-box');
            const feedbackP = document.getElementById('ai-feedback');

            if (!essay) return alert("Paste an essay first!");

            btn.innerText = "AI is thinking...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "contents": [{"parts": [{"text": "Grade this essay strictly and give a letter grade: " + essay}]}]
                    })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                box.classList.remove('hidden');
                feedbackP.innerText = aiResponse;
            } catch (e) {
                console.error(e);
                alert("AI Error. Try refreshing.");
            }
            btn.innerText = "Analyze Essay";
            btn.disabled = false;
        }
    </script>

    <style>
        .glitch { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; animation: glitch 725ms infinite; }
        @keyframes glitch { 0% { text-shadow: 0.05em 0 0 #00fffc; } 50% { text-shadow: -0.05em -0.025em 0 #fc00ff; } 100% { text-shadow: 0.025em 0.05em 0 #fffc00; } }
    </style>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-black mb-10 glitch">ScholarLink</h1>
        
        <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl">
            <h2 class="text-2xl font-bold mb-4 text-blue-400">AI Essay Grader</h2>
            <textarea id="essay-input" rows="8" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4 text-white outline-none focus:border-blue-500" placeholder="Paste essay here..."></textarea>
            <button id="grade-btn" onclick="gradeEssay()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-10 rounded-xl transition w-full">
                Analyze Essay
            </button>

            <div id="feedback-box" class="hidden mt-8 p-6 bg-slate-900 rounded-xl border border-green-500/50">
                <p id="ai-feedback" class="text-slate-200 italic"></p>
            </div>
        </div>
    </div>
</body>
</html>
